name: "CICD"

# Deployment strategy:
#   pull_request to dev  -> deploys to the 'test' GitHub environment
#   pull_request to main -> deploys to the 'qa' GitHub environment
#   push to dev          -> deploys to the 'dev' GitHub environment
#   push to main         -> deploys to the 'prod' GitHub environment
#                          (configure required reviewers in GitHub environment
#                          settings to enforce an approval gate before prod goes live)
#
# All environments must be configured in GitHub -> Settings -> Environments
# with the following variables:
#   PROJECT                  - GCP project ID
#   LOCATION                 - GCP region (e.g. us-central1)
#   REGISTRY                 - Artifact Registry host (e.g. us-central1-docker.pkg.dev)
#   REPOSITORY               - Registry repository path (e.g. myproject/myproject-repository)
#   TERRAFORM_BACKEND_BUCKET - GCS bucket for Terraform state
#   GCP_SERVICE_ACCOUNT      - Service account email for Workload Identity auth
#   WIF_PROVIDER             - Full Workload Identity Federation provider resource name
# and the following secret:
#   OPENAI_API_KEY
#
# Image tagging strategy:
#   test  -> :test   qa -> :qa   dev -> :dev   prod -> :latest
#
# On first deployment the env-specific images do not exist yet, so Terraform
# falls back to the public hello image.  Subsequent Terraform runs ignore the
# image attribute (lifecycle.ignore_changes) to preserve whatever tag
# gcloud run deploy has set.

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

permissions:
  contents: read
  id-token: write

jobs:
  DeployTest:
    if: github.event_name == 'pull_request' && github.base_ref == 'dev'
    uses: ./.github/workflows/deploy-environment.yaml
    with:
      environment: test
    secrets: inherit

  DeployQa:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    uses: ./.github/workflows/deploy-environment.yaml
    with:
      environment: qa
    secrets: inherit

  DeployDev:
    if: github.event_name == 'push' && github.ref_name == 'dev'
    uses: ./.github/workflows/deploy-environment.yaml
    with:
      environment: dev
    secrets: inherit

  DeployProd:
    if: github.event_name == 'push' && github.ref_name == 'main'
    uses: ./.github/workflows/deploy-environment.yaml
    with:
      environment: prod
    secrets: inherit
