name: "CICD"

# Deployment strategy:
#   pull_request to dev  → deploys to the 'test' GitHub environment
#   pull_request to main → deploys to the 'qa' GitHub environment
#   push to dev          → deploys to the 'dev' GitHub environment
#   push to main         → deploys to the 'prod' GitHub environment
#                          (configure required reviewers in GitHub environment
#                          settings to enforce an approval gate before prod goes live)
#
# All environments must be configured in GitHub → Settings → Environments
# with the following variables:
#   PROJECT                  - GCP project ID
#   LOCATION                 - GCP region (e.g. us-central1)
#   REGISTRY                 - Artifact Registry host (e.g. us-central1-docker.pkg.dev)
#   REPOSITORY               - Registry repository path (e.g. myproject/myproject-repository)
#   TERRAFORM_BACKEND_BUCKET - GCS bucket for Terraform state
#   GCP_SERVICE_ACCOUNT      - Service account email for Workload Identity auth
#   WIF_PROVIDER             - Full Workload Identity Federation provider resource name
#   USE_FALLBACK_IMAGE       - (optional) set to 'true' to let Terraform use its default
#                              container images instead of the images built in this pipeline
# and the following secret:
#   OPENAI_API_KEY

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

env:
  FE_IMAGE_NAME: ankiaicardcreationtoolboxfrontend
  BE_IMAGE_NAME: ankiaicardcreationtoolboxbackend


jobs:

  TestApi:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend/AnkiAICardCreationToolboxBackend
    steps:
      - uses: actions/checkout@v6

      - name: Use Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv
        run: |
          pip install uv

      - name: Check lock
        run: uv lock --check

      - name: Install Dependencies
        run: uv sync --frozen --all-extras

      - name: Ruff Lint
        run: uv run ruff check .

      - name: Ruff Format Check
        run: uv run ruff format --check .

      - name: Type Check
        run: uv run ty check

      - name: Run Tests
        env:
          # PRs run with mocked LLM calls (empty key); pushes use the real API key.
          OPENAI_API_KEY: ${{ github.event_name == 'push' && secrets.OPENAI_API_KEY || '' }}
        run: uv run pytest

  TestFrontend:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend/AnkiAICardCreationFrontend
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25.x'

      - name: Security Audit (lockfile)
        run: npm audit --package-lock-only --audit-level=critical

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:unit


  # ============================================================
  # ENVIRONMENT DEPLOYMENT PIPELINE
  #   pull_request to dev  -> test
  #   pull_request to main -> qa
  #   push to dev          -> dev
  #   push to main         -> prod
  # ============================================================

  # --------------- test (pull_request → dev) ---------------

  EnsureTerraformBackendExistsTest:
    if: github.event_name == 'pull_request' && github.base_ref == 'dev'
    environment: test
    concurrency:
      group: deployment-test
      cancel-in-progress: false
    permissions:
      contents: 'read'
      id-token: 'write'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
      - uses: 'google-github-actions/auth@v3'
        with:
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          create_credentials_file: true
          export_environment_variables: true
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
      - name: 'Use gcloud CLI'
        run: 'gcloud info'
      - name: check/create bucket
        run: |
          gcloud storage buckets describe "gs://${{ vars.TERRAFORM_BACKEND_BUCKET }}" \
            --project="${{ vars.PROJECT }}" \
          || gcloud storage buckets create "gs://${{ vars.TERRAFORM_BACKEND_BUCKET }}" \
            --project="${{ vars.PROJECT }}" \
            --location="${{ vars.LOCATION }}"

  TerraformTest:
    name: Terraform (Test)
    if: github.event_name == 'pull_request' && github.base_ref == 'dev'
    environment: test
    concurrency:
      group: deployment-test
      cancel-in-progress: false
    needs: [EnsureTerraformBackendExistsTest]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infrastructure
    env:
      IMAGE_TAG: test
      USE_FALLBACK_IMAGE: ${{ vars.USE_FALLBACK_IMAGE }}
    outputs:
      backend_url: ${{ steps.terraform-output.outputs.backend_url }}
      frontend_url: ${{ steps.terraform-output.outputs.frontend_url }}
      backend_name: ${{ steps.terraform-output.outputs.backend_name }}
      frontend_name: ${{ steps.terraform-output.outputs.frontend_name }}
    permissions:
      contents: 'read'
      id-token: 'write'
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: 'google-github-actions/auth@v3'
        with:
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          create_credentials_file: true
          export_environment_variables: true
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
      - name: 'Use gcloud CLI'
        run: 'gcloud info'
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
      - name: Terraform Format
        id: fmt
        run: terraform fmt -check
      - name: Terraform Init
        id: init
        run: terraform init -backend-config="bucket=${{ vars.TERRAFORM_BACKEND_BUCKET }}"
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
      - name: Terraform Apply
        run: |
          if [ "$USE_FALLBACK_IMAGE" = "true" ]; then
            terraform apply -auto-approve -input=false \
              -var="project=${{ vars.PROJECT }}"
          else
            terraform apply -auto-approve -input=false \
              -var="project=${{ vars.PROJECT }}" \
              -var="backend_image=${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.BE_IMAGE_NAME }}:$IMAGE_TAG" \
              -var="frontend_image=${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.FE_IMAGE_NAME }}:$IMAGE_TAG"
          fi
      - name: Capture Terraform output
        id: terraform-output
        run: |
          echo "backend_url=$(terraform output -raw backend_url)" >> $GITHUB_OUTPUT
          echo "frontend_url=$(terraform output -raw frontend_url)" >> $GITHUB_OUTPUT
          echo "backend_name=$(terraform output -raw backend_name)" >> $GITHUB_OUTPUT
          echo "frontend_name=$(terraform output -raw frontend_name)" >> $GITHUB_OUTPUT
      - name: Log Terraform URLs
        run: |
          echo "Backend URL: ${{ steps.terraform-output.outputs.backend_url }}"
          echo "Frontend URL: ${{ steps.terraform-output.outputs.frontend_url }}"

  BuildPushDeployFETest:
    name: Build Push and Deploy Frontend (Test)
    if: github.event_name == 'pull_request' && github.base_ref == 'dev'
    environment: test
    concurrency:
      group: deployment-test
      cancel-in-progress: false
    needs: [TerraformTest, TestFrontend]
    runs-on: ubuntu-latest
    env:
      CACHE_TAG: buildcache-test
      IMAGE_TAG: test
      SERVICE_NAME: ${{ needs.TerraformTest.outputs.frontend_name }}
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v6
      - id: auth
        uses: 'google-github-actions/auth@v3'
        with:
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          create_credentials_file: true
          export_environment_variables: true
          access_token_lifetime: 300s
          token_format: access_token
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
      - name: 'Use gcloud CLI'
        run: 'gcloud info'
      - name: 'Login to GCR'
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: 'Build and push fe Docker image'
        uses: docker/build-push-action@v7
        with:
          context: frontend/AnkiAICardCreationFrontend
          platforms: linux/amd64
          file: frontend/AnkiAICardCreationFrontend/Dockerfile
          push: true
          tags: ${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.FE_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=registry,ref=${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.FE_IMAGE_NAME }}:${{ env.CACHE_TAG }}
          cache-to: type=registry,ref=${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.FE_IMAGE_NAME }}:${{ env.CACHE_TAG }},mode=max
      - name: 'Deploy fe to Cloud Run'
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --image "${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.FE_IMAGE_NAME }}:${{ env.IMAGE_TAG }}" \
            --region "${{ vars.LOCATION }}"

  BuildPushDeployBETest:
    name: Build Push and Deploy Backend (Test)
    if: github.event_name == 'pull_request' && github.base_ref == 'dev'
    environment: test
    concurrency:
      group: deployment-test
      cancel-in-progress: false
    needs: [TerraformTest, TestApi]
    runs-on: ubuntu-latest
    env:
      CACHE_TAG: buildcache-test
      IMAGE_TAG: test
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SERVICE_NAME: ${{ needs.TerraformTest.outputs.backend_name }}
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v6
      - id: auth
        uses: 'google-github-actions/auth@v3'
        with:
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          create_credentials_file: true
          export_environment_variables: true
          access_token_lifetime: 300s
          token_format: access_token
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
      - name: 'Use gcloud CLI'
        run: 'gcloud info'
      - name: 'Login to GCR'
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: 'Build and push be Docker image'
        uses: docker/build-push-action@v7
        with:
          context: backend/AnkiAICardCreationToolboxBackend/
          platforms: linux/amd64
          file: backend/AnkiAICardCreationToolboxBackend/Dockerfile
          push: true
          tags: ${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.BE_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=registry,ref=${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.BE_IMAGE_NAME }}:${{ env.CACHE_TAG }}
          cache-to: type=registry,ref=${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.BE_IMAGE_NAME }}:${{ env.CACHE_TAG }},mode=max
      - name: 'Add Secret Version in Secret Manager'
        run: |
          printf "%s" "$OPENAI_API_KEY" | gcloud secrets versions add openai --data-file=- --project="${{ vars.PROJECT }}"
      - name: 'Deploy be to Cloud Run'
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --image "${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.BE_IMAGE_NAME }}:${{ env.IMAGE_TAG }}" \
            --update-secrets=OPENAI_API_KEY=openai:latest \
            --region "${{ vars.LOCATION }}"

  TestDeploymentTest:
    name: Test Deployment (Test)
    if: github.event_name == 'pull_request' && github.base_ref == 'dev'
    environment: test
    concurrency:
      group: deployment-test
      cancel-in-progress: false
    needs: [TerraformTest, BuildPushDeployFETest, BuildPushDeployBETest]
    runs-on: ubuntu-latest
    env:
      BACKEND_URL: ${{ needs.TerraformTest.outputs.backend_url }}
      FRONTEND_URL: ${{ needs.TerraformTest.outputs.frontend_url }}
    permissions:
      contents: 'read'
    steps:
      - uses: actions/checkout@v6
      - name: 'Wait for function to start'
        run: sleep 120
      - name: 'Test Frontend Deployment'
        run: |
          curl --fail --silent --show-error --location --max-time 30 "$FRONTEND_URL"
      - name: 'Test Backend Deployment'
        run: |
          curl --fail --show-error --location \
            -X POST "$BACKEND_URL/create_cards" \
            -H "Content-Type: application/json" \
            -d '{"text":"Anki Karten zur Funktionsweise von HTTP"}'

  # --------------- qa (pull_request → main) ---------------

  EnsureTerraformBackendExistsQa:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    environment: qa
    concurrency:
      group: deployment-qa
      cancel-in-progress: false
    permissions:
      contents: 'read'
      id-token: 'write'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
      - uses: 'google-github-actions/auth@v3'
        with:
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          create_credentials_file: true
          export_environment_variables: true
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
      - name: 'Use gcloud CLI'
        run: 'gcloud info'
      - name: check/create bucket
        run: |
          gcloud storage buckets describe "gs://${{ vars.TERRAFORM_BACKEND_BUCKET }}" \
            --project="${{ vars.PROJECT }}" \
          || gcloud storage buckets create "gs://${{ vars.TERRAFORM_BACKEND_BUCKET }}" \
            --project="${{ vars.PROJECT }}" \
            --location="${{ vars.LOCATION }}"

  TerraformQa:
    name: Terraform (QA)
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    environment: qa
    concurrency:
      group: deployment-qa
      cancel-in-progress: false
    needs: [EnsureTerraformBackendExistsQa]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infrastructure
    env:
      IMAGE_TAG: qa
      USE_FALLBACK_IMAGE: ${{ vars.USE_FALLBACK_IMAGE }}
    outputs:
      backend_url: ${{ steps.terraform-output.outputs.backend_url }}
      frontend_url: ${{ steps.terraform-output.outputs.frontend_url }}
      backend_name: ${{ steps.terraform-output.outputs.backend_name }}
      frontend_name: ${{ steps.terraform-output.outputs.frontend_name }}
    permissions:
      contents: 'read'
      id-token: 'write'
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: 'google-github-actions/auth@v3'
        with:
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          create_credentials_file: true
          export_environment_variables: true
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
      - name: 'Use gcloud CLI'
        run: 'gcloud info'
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
      - name: Terraform Format
        id: fmt
        run: terraform fmt -check
      - name: Terraform Init
        id: init
        run: terraform init -backend-config="bucket=${{ vars.TERRAFORM_BACKEND_BUCKET }}"
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
      - name: Terraform Apply
        run: |
          if [ "$USE_FALLBACK_IMAGE" = "true" ]; then
            terraform apply -auto-approve -input=false \
              -var="project=${{ vars.PROJECT }}"
          else
            terraform apply -auto-approve -input=false \
              -var="project=${{ vars.PROJECT }}" \
              -var="backend_image=${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.BE_IMAGE_NAME }}:$IMAGE_TAG" \
              -var="frontend_image=${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.FE_IMAGE_NAME }}:$IMAGE_TAG"
          fi
      - name: Capture Terraform output
        id: terraform-output
        run: |
          echo "backend_url=$(terraform output -raw backend_url)" >> $GITHUB_OUTPUT
          echo "frontend_url=$(terraform output -raw frontend_url)" >> $GITHUB_OUTPUT
          echo "backend_name=$(terraform output -raw backend_name)" >> $GITHUB_OUTPUT
          echo "frontend_name=$(terraform output -raw frontend_name)" >> $GITHUB_OUTPUT
      - name: Log Terraform URLs
        run: |
          echo "Backend URL: ${{ steps.terraform-output.outputs.backend_url }}"
          echo "Frontend URL: ${{ steps.terraform-output.outputs.frontend_url }}"

  BuildPushDeployFEQa:
    name: Build Push and Deploy Frontend (QA)
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    environment: qa
    concurrency:
      group: deployment-qa
      cancel-in-progress: false
    needs: [TerraformQa, TestFrontend]
    runs-on: ubuntu-latest
    env:
      CACHE_TAG: buildcache-qa
      IMAGE_TAG: qa
      SERVICE_NAME: ${{ needs.TerraformQa.outputs.frontend_name }}
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v6
      - id: auth
        uses: 'google-github-actions/auth@v3'
        with:
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          create_credentials_file: true
          export_environment_variables: true
          access_token_lifetime: 300s
          token_format: access_token
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
      - name: 'Use gcloud CLI'
        run: 'gcloud info'
      - name: 'Login to GCR'
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: 'Build and push fe Docker image'
        uses: docker/build-push-action@v7
        with:
          context: frontend/AnkiAICardCreationFrontend
          platforms: linux/amd64
          file: frontend/AnkiAICardCreationFrontend/Dockerfile
          push: true
          tags: ${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.FE_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=registry,ref=${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.FE_IMAGE_NAME }}:${{ env.CACHE_TAG }}
          cache-to: type=registry,ref=${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.FE_IMAGE_NAME }}:${{ env.CACHE_TAG }},mode=max
      - name: 'Deploy fe to Cloud Run'
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --image "${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.FE_IMAGE_NAME }}:${{ env.IMAGE_TAG }}" \
            --region "${{ vars.LOCATION }}"

  BuildPushDeployBEQa:
    name: Build Push and Deploy Backend (QA)
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    environment: qa
    concurrency:
      group: deployment-qa
      cancel-in-progress: false
    needs: [TerraformQa, TestApi]
    runs-on: ubuntu-latest
    env:
      CACHE_TAG: buildcache-qa
      IMAGE_TAG: qa
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SERVICE_NAME: ${{ needs.TerraformQa.outputs.backend_name }}
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v6
      - id: auth
        uses: 'google-github-actions/auth@v3'
        with:
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          create_credentials_file: true
          export_environment_variables: true
          access_token_lifetime: 300s
          token_format: access_token
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
      - name: 'Use gcloud CLI'
        run: 'gcloud info'
      - name: 'Login to GCR'
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: 'Build and push be Docker image'
        uses: docker/build-push-action@v7
        with:
          context: backend/AnkiAICardCreationToolboxBackend/
          platforms: linux/amd64
          file: backend/AnkiAICardCreationToolboxBackend/Dockerfile
          push: true
          tags: ${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.BE_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=registry,ref=${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.BE_IMAGE_NAME }}:${{ env.CACHE_TAG }}
          cache-to: type=registry,ref=${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.BE_IMAGE_NAME }}:${{ env.CACHE_TAG }},mode=max
      - name: 'Add Secret Version in Secret Manager'
        run: |
          printf "%s" "$OPENAI_API_KEY" | gcloud secrets versions add openai --data-file=- --project="${{ vars.PROJECT }}"
      - name: 'Deploy be to Cloud Run'
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --image "${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.BE_IMAGE_NAME }}:${{ env.IMAGE_TAG }}" \
            --update-secrets=OPENAI_API_KEY=openai:latest \
            --region "${{ vars.LOCATION }}"

  TestDeploymentQa:
    name: Test Deployment (QA)
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    environment: qa
    concurrency:
      group: deployment-qa
      cancel-in-progress: false
    needs: [TerraformQa, BuildPushDeployFEQa, BuildPushDeployBEQa]
    runs-on: ubuntu-latest
    env:
      BACKEND_URL: ${{ needs.TerraformQa.outputs.backend_url }}
      FRONTEND_URL: ${{ needs.TerraformQa.outputs.frontend_url }}
    permissions:
      contents: 'read'
    steps:
      - uses: actions/checkout@v6
      - name: 'Wait for function to start'
        run: sleep 120
      - name: 'Test Frontend Deployment'
        run: |
          curl --fail --silent --show-error --location --max-time 30 "$FRONTEND_URL"
      - name: 'Test Backend Deployment'
        run: |
          curl --fail --show-error --location \
            -X POST "$BACKEND_URL/create_cards" \
            -H "Content-Type: application/json" \
            -d '{"text":"Anki Karten zur Funktionsweise von HTTP"}'

  # --------------- dev (push → dev) ---------------

  EnsureTerraformBackendExistsDev:
    if: github.event_name == 'push' && github.ref_name == 'dev'
    environment: dev
    concurrency:
      group: deployment-dev
      cancel-in-progress: false
    permissions:
      contents: 'read'
      id-token: 'write'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
      - uses: 'google-github-actions/auth@v3'
        with:
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          create_credentials_file: true
          export_environment_variables: true
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
      - name: 'Use gcloud CLI'
        run: 'gcloud info'
      - name: check/create bucket
        run: |
          gcloud storage buckets describe "gs://${{ vars.TERRAFORM_BACKEND_BUCKET }}" \
            --project="${{ vars.PROJECT }}" \
