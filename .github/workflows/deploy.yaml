name: "CICD"

# Deployment strategy:
#   pull_request  → deploys to the 'test' GitHub environment
#   push to main  → deploys to the 'production' GitHub environment
#                   (configure required reviewers in GitHub environment settings
#                   to enforce an approval gate before production goes live)
#
# Both environments must be configured in GitHub → Settings → Environments
# with the following variables:
#   PROJECT                  - GCP project ID
#   LOCATION                 - GCP region (e.g. us-central1)
#   REGISTRY                 - Artifact Registry host (e.g. us-central1-docker.pkg.dev)
#   REPOSITORY               - Registry repository path (e.g. myproject/myproject-repository)
#   TERRAFORM_BACKEND_BUCKET - GCS bucket for Terraform state
#   GCP_SERVICE_ACCOUNT      - Service account email for Workload Identity auth
#   WIF_PROVIDER             - Full Workload Identity Federation provider resource name
# and the following secret:
#   OPENAI_API_KEY

on:
  push:
    branches:
      - main
  pull_request:

env:
  FE_IMAGE_NAME: ankiaicardcreationtoolboxfrontend
  BE_IMAGE_NAME: ankiaicardcreationtoolboxbackend


jobs:

  TestApi:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend/AnkiAICardCreationToolboxBackend
    steps:
      - uses: actions/checkout@v6

      - name: Use Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv
        run: |
          pip install uv

      - name: Check lock
        run: uv lock --check

      - name: Install Dependencies
        run: uv sync --frozen --all-extras

      - name: Ruff Lint
        run: uv run ruff check .

      - name: Ruff Format Check
        run: uv run ruff format --check .

      - name: Type Check
        run: uv run ty check

      - name: Run Tests
        env:
          # PRs run with mocked LLM calls (empty key); pushes to main use the real API key.
          OPENAI_API_KEY: ${{ github.event_name == 'push' && secrets.OPENAI_API_KEY || '' }}
        run: uv run pytest

  TestFrontend:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend/AnkiAICardCreationFrontend
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25.x'

      - name: Security Audit (lockfile)
        run: npm audit --package-lock-only --audit-level=critical

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:unit


  # ============================================================
  # TEST ENVIRONMENT — triggered on pull_request
  # ============================================================

  EnsureTerraformBackendExistsTest:
    if: github.event_name == 'pull_request'
    environment: test
    concurrency:
      group: deployment-test
      cancel-in-progress: false
    permissions:
      contents: 'read'
      id-token: 'write'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
      - uses: 'google-github-actions/auth@v3'
        with:
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          create_credentials_file: true
          export_environment_variables: true
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
      - name: 'Use gcloud CLI'
        run: 'gcloud info'
      - name: check/create bucket
        run: |
          gcloud storage buckets describe "gs://${{ vars.TERRAFORM_BACKEND_BUCKET }}" \
            --project="${{ vars.PROJECT }}" \
          || gcloud storage buckets create "gs://${{ vars.TERRAFORM_BACKEND_BUCKET }}" \
            --project="${{ vars.PROJECT }}" \
            --location="${{ vars.LOCATION }}"

  TerraformTest:
    if: github.event_name == 'pull_request'
    environment: test
    concurrency:
      group: deployment-test
      cancel-in-progress: false
    needs: [EnsureTerraformBackendExistsTest]
    name: "Terraform (Test)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infrastructure
    outputs:
      backend_url: ${{ steps.terraform-output.outputs.backend_url }}
      frontend_url: ${{ steps.terraform-output.outputs.frontend_url }}
      backend_name: ${{ steps.terraform-output.outputs.backend_name }}
      frontend_name: ${{ steps.terraform-output.outputs.frontend_name }}
    permissions:
      contents: 'read'
      id-token: 'write'
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: 'google-github-actions/auth@v3'
        with:
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          create_credentials_file: true
          export_environment_variables: true
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
      - name: 'Use gcloud CLI'
        run: 'gcloud info'
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
      - name: Terraform Format
        id: fmt
        run: terraform fmt -check
      - name: Terraform Init
        id: init
        run: terraform init -backend-config="bucket=${{ vars.TERRAFORM_BACKEND_BUCKET }}"
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
      - name: Terraform Apply
        run: |
          terraform apply -auto-approve -input=false \
            -var="project=${{ vars.PROJECT }}" \
            -var="backend_image=us-docker.pkg.dev/cloudrun/container/hello" \
            -var="frontend_image=us-docker.pkg.dev/cloudrun/container/hello"
      - name: Capture Terraform output
        id: terraform-output
        run: |
          echo "backend_url=$(terraform output -raw backend_url)" >> $GITHUB_OUTPUT
          echo "frontend_url=$(terraform output -raw frontend_url)" >> $GITHUB_OUTPUT
          echo "backend_name=$(terraform output -raw backend_name)" >> $GITHUB_OUTPUT
          echo "frontend_name=$(terraform output -raw frontend_name)" >> $GITHUB_OUTPUT
      - name: Log Terraform URLs
        run: |
          echo "Backend URL: ${{ steps.terraform-output.outputs.backend_url }}"
          echo "Frontend URL: ${{ steps.terraform-output.outputs.frontend_url }}"

  BuildPushDeployFETest:
    if: github.event_name == 'pull_request'
    environment: test
    concurrency:
      group: deployment-test
      cancel-in-progress: false
    needs: [TerraformTest, TestFrontend]
    name: "Build Push and Deploy Frontend (Test)"
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v6
      - id: auth
        uses: 'google-github-actions/auth@v3'
        with:
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          create_credentials_file: true
          export_environment_variables: true
          access_token_lifetime: 300s
          token_format: access_token
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
      - name: 'Use gcloud CLI'
        run: 'gcloud info'
      - name: 'Login to GCR'
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: 'Build and push fe Docker image'
        uses: docker/build-push-action@v7
        with:
          context: frontend/AnkiAICardCreationFrontend
          platforms: linux/amd64
          file: frontend/AnkiAICardCreationFrontend/Dockerfile
          push: true
          tags: ${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.FE_IMAGE_NAME }}:test
          cache-from: type=registry,ref=${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.FE_IMAGE_NAME }}:buildcache-test
          cache-to: type=registry,ref=${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.FE_IMAGE_NAME }}:buildcache-test,mode=max
      - name: 'Deploy fe to Cloud Run'
        run: |
          gcloud run deploy ${{ needs.TerraformTest.outputs.frontend_name }} \
            --image ${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.FE_IMAGE_NAME }}:test \
            --region ${{ vars.LOCATION }}

  BuildPushDeployBETest:
    if: github.event_name == 'pull_request'
    environment: test
    concurrency:
      group: deployment-test
      cancel-in-progress: false
    needs: [TerraformTest, TestApi]
    name: "Build Push and Deploy Backend (Test)"
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v6
      - id: auth
        uses: 'google-github-actions/auth@v3'
        with:
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          create_credentials_file: true
          export_environment_variables: true
          access_token_lifetime: 300s
          token_format: access_token
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
      - name: 'Use gcloud CLI'
        run: 'gcloud info'
      - name: 'Login to GCR'
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: 'Build and push be Docker image'
        uses: docker/build-push-action@v7
        with:
          context: backend/AnkiAICardCreationToolboxBackend/
          platforms: linux/amd64
          file: backend/AnkiAICardCreationToolboxBackend/Dockerfile
          push: true
          tags: ${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.BE_IMAGE_NAME }}:test
          cache-from: type=registry,ref=${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.BE_IMAGE_NAME }}:buildcache-test
          cache-to: type=registry,ref=${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.BE_IMAGE_NAME }}:buildcache-test,mode=max
      - name: 'Add Secret Version in Secret Manager'
        run: |
          printf "%s" "$OPENAI_API_KEY" | gcloud secrets versions add openai --data-file=- --project="${{ vars.PROJECT }}"
      - name: 'Deploy be to Cloud Run'
        run: |
          gcloud run deploy ${{ needs.TerraformTest.outputs.backend_name }} \
            --image ${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.BE_IMAGE_NAME }}:test \
            --update-secrets=OPENAI_API_KEY=openai:latest \
            --region ${{ vars.LOCATION }}

  TestDeploymentTest:
    if: github.event_name == 'pull_request'
    environment: test
    concurrency:
      group: deployment-test
      cancel-in-progress: false
    needs: [TerraformTest, BuildPushDeployFETest, BuildPushDeployBETest]
    name: "Test Deployment (Test)"
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
    steps:
      - uses: actions/checkout@v6
      - name: 'Wait for function to start'
        run: sleep 120
      - name: 'Test Frontend Deployment'
        run: |
          curl --fail --silent --show-error --location --max-time 30 "${{ needs.TerraformTest.outputs.frontend_url }}"
      - name: 'Test Backend Deployment'
        run: |
          curl --fail --show-error --location \
            -X POST "${{ needs.TerraformTest.outputs.backend_url }}/create_cards" \
            -H "Content-Type: application/json" \
            -d '{"text":"Anki Karten zur Funktionsweise von HTTP"}'


  # ============================================================
  # PRODUCTION ENVIRONMENT — triggered on push to main
  # Configure required reviewers in the 'production' GitHub environment
  # settings to enforce an approval gate before deployment proceeds.
  # ============================================================

  EnsureTerraformBackendExistsProd:
    if: github.event_name == 'push'
    environment: production
    concurrency:
      group: deployment-prod
      cancel-in-progress: false
    permissions:
      contents: 'read'
      id-token: 'write'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
      - uses: 'google-github-actions/auth@v3'
        with:
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          create_credentials_file: true
          export_environment_variables: true
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
      - name: 'Use gcloud CLI'
        run: 'gcloud info'
      - name: check/create bucket
        run: |
          gcloud storage buckets describe "gs://${{ vars.TERRAFORM_BACKEND_BUCKET }}" \
            --project="${{ vars.PROJECT }}" \
          || gcloud storage buckets create "gs://${{ vars.TERRAFORM_BACKEND_BUCKET }}" \
            --project="${{ vars.PROJECT }}" \
            --location="${{ vars.LOCATION }}"

  TerraformProd:
    if: github.event_name == 'push'
    environment: production
    concurrency:
      group: deployment-prod
      cancel-in-progress: false
    needs: [EnsureTerraformBackendExistsProd]
    name: "Terraform (Production)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infrastructure
    outputs:
      backend_url: ${{ steps.terraform-output.outputs.backend_url }}
      frontend_url: ${{ steps.terraform-output.outputs.frontend_url }}
      backend_name: ${{ steps.terraform-output.outputs.backend_name }}
      frontend_name: ${{ steps.terraform-output.outputs.frontend_name }}
    permissions:
      contents: 'read'
      id-token: 'write'
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: 'google-github-actions/auth@v3'
        with:
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          create_credentials_file: true
          export_environment_variables: true
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
      - name: 'Use gcloud CLI'
        run: 'gcloud info'
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
      - name: Terraform Format
        id: fmt
        run: terraform fmt -check
      - name: Terraform Init
        id: init
        run: terraform init -backend-config="bucket=${{ vars.TERRAFORM_BACKEND_BUCKET }}"
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
      - name: Terraform Apply
        run: |
          terraform apply -auto-approve -input=false \
            -var="project=${{ vars.PROJECT }}" \
            -var="backend_image=us-docker.pkg.dev/cloudrun/container/hello" \
            -var="frontend_image=us-docker.pkg.dev/cloudrun/container/hello"
      - name: Capture Terraform output
        id: terraform-output
        run: |
          echo "backend_url=$(terraform output -raw backend_url)" >> $GITHUB_OUTPUT
          echo "frontend_url=$(terraform output -raw frontend_url)" >> $GITHUB_OUTPUT
          echo "backend_name=$(terraform output -raw backend_name)" >> $GITHUB_OUTPUT
          echo "frontend_name=$(terraform output -raw frontend_name)" >> $GITHUB_OUTPUT
      - name: Log Terraform URLs
        run: |
          echo "Backend URL: ${{ steps.terraform-output.outputs.backend_url }}"
          echo "Frontend URL: ${{ steps.terraform-output.outputs.frontend_url }}"

  BuildPushDeployFEProd:
    if: github.event_name == 'push'
    environment: production
    concurrency:
      group: deployment-prod
      cancel-in-progress: false
    needs: [TerraformProd, TestFrontend]
    name: "Build Push and Deploy Frontend (Production)"
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v6
      - id: auth
        uses: 'google-github-actions/auth@v3'
        with:
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          create_credentials_file: true
          export_environment_variables: true
          access_token_lifetime: 300s
          token_format: access_token
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
      - name: 'Use gcloud CLI'
        run: 'gcloud info'
      - name: 'Login to GCR'
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: 'Build and push fe Docker image'
        uses: docker/build-push-action@v7
        with:
          context: frontend/AnkiAICardCreationFrontend
          platforms: linux/amd64
          file: frontend/AnkiAICardCreationFrontend/Dockerfile
          push: true
          tags: ${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.FE_IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.FE_IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.FE_IMAGE_NAME }}:buildcache,mode=max
      - name: 'Deploy fe to Cloud Run'
        run: |
          gcloud run deploy ${{ needs.TerraformProd.outputs.frontend_name }} \
            --image ${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.FE_IMAGE_NAME }}:latest \
            --region ${{ vars.LOCATION }}

  BuildPushDeployBEProd:
    if: github.event_name == 'push'
    environment: production
    concurrency:
      group: deployment-prod
      cancel-in-progress: false
    needs: [TerraformProd, TestApi]
    name: "Build Push and Deploy Backend (Production)"
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v6
      - id: auth
        uses: 'google-github-actions/auth@v3'
        with:
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          create_credentials_file: true
          export_environment_variables: true
          access_token_lifetime: 300s
          token_format: access_token
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
      - name: 'Use gcloud CLI'
        run: 'gcloud info'
      - name: 'Login to GCR'
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: 'Build and push be Docker image'
        uses: docker/build-push-action@v7
        with:
          context: backend/AnkiAICardCreationToolboxBackend/
          platforms: linux/amd64
          file: backend/AnkiAICardCreationToolboxBackend/Dockerfile
          push: true
          tags: ${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.BE_IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.BE_IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.BE_IMAGE_NAME }}:buildcache,mode=max
      - name: 'Add Secret Version in Secret Manager'
        run: |
          printf "%s" "$OPENAI_API_KEY" | gcloud secrets versions add openai --data-file=- --project="${{ vars.PROJECT }}"
      - name: 'Deploy be to Cloud Run'
        run: |
          gcloud run deploy ${{ needs.TerraformProd.outputs.backend_name }} \
            --image ${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.BE_IMAGE_NAME }}:latest \
            --update-secrets=OPENAI_API_KEY=openai:latest \
            --region ${{ vars.LOCATION }}

  TestDeploymentProd:
    if: github.event_name == 'push'
    environment: production
    concurrency:
      group: deployment-prod
      cancel-in-progress: false
    needs: [TerraformProd, BuildPushDeployFEProd, BuildPushDeployBEProd]
    name: "Test Deployment (Production)"
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
    steps:
      - uses: actions/checkout@v6
      - name: 'Wait for function to start'
        run: sleep 120
      - name: 'Test Frontend Deployment'
        run: |
          curl --fail --silent --show-error --location --max-time 30 "${{ needs.TerraformProd.outputs.frontend_url }}"
      - name: 'Test Backend Deployment'
        run: |
          curl --fail --show-error --location \
            -X POST "${{ needs.TerraformProd.outputs.backend_url }}/create_cards" \
            -H "Content-Type: application/json" \
            -d '{"text":"Anki Karten zur Funktionsweise von HTTP"}'
