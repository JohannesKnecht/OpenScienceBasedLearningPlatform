name: "CICD"

# Deployment strategy:
#   pull_request to dev  → deploys to the 'test' GitHub environment
#   pull_request to main → deploys to the 'qa' GitHub environment
#   push to dev          → deploys to the 'dev' GitHub environment
#   push to main         → deploys to the 'prod' GitHub environment
#                          (configure required reviewers in GitHub environment
#                          settings to enforce an approval gate before prod goes live)
#
# All environments must be configured in GitHub → Settings → Environments
# with the following variables:
#   PROJECT                  - GCP project ID
#   LOCATION                 - GCP region (e.g. us-central1)
#   REGISTRY                 - Artifact Registry host (e.g. us-central1-docker.pkg.dev)
#   REPOSITORY               - Registry repository path (e.g. myproject/myproject-repository)
#   TERRAFORM_BACKEND_BUCKET - GCS bucket for Terraform state
#   GCP_SERVICE_ACCOUNT      - Service account email for Workload Identity auth
#   WIF_PROVIDER             - Full Workload Identity Federation provider resource name
# and the following secret:
#   OPENAI_API_KEY
#
# Image tagging strategy (per environment):
#   test → :test   qa → :qa   dev → :dev   prod → :latest
#
# On first deployment the env-specific images do not exist yet, so Terraform
# falls back to the public hello image.  Subsequent Terraform runs ignore the
# image attribute (lifecycle.ignore_changes) to preserve whatever tag
# gcloud run deploy has set.

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

env:
  FE_IMAGE_NAME: ankiaicardcreationtoolboxfrontend
  BE_IMAGE_NAME: ankiaicardcreationtoolboxbackend


jobs:

  TestApi:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend/AnkiAICardCreationToolboxBackend
    steps:
      - uses: actions/checkout@v6

      - name: Use Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv
        run: |
          pip install uv

      - name: Check lock
        run: uv lock --check

      - name: Install Dependencies
        run: uv sync --frozen --all-extras

      - name: Ruff Lint
        run: uv run ruff check .

      - name: Ruff Format Check
        run: uv run ruff format --check .

      - name: Type Check
        run: uv run ty check

      - name: Run Tests
        env:
          # PRs run with mocked LLM calls (empty key); pushes use the real API key.
          OPENAI_API_KEY: ${{ github.event_name == 'push' && secrets.OPENAI_API_KEY || '' }}
        run: uv run pytest

  TestFrontend:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend/AnkiAICardCreationFrontend
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25.x'

      - name: Security Audit (lockfile)
        run: npm audit --package-lock-only --audit-level=critical

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:unit


  # ============================================================
  # ENVIRONMENT DEPLOYMENT PIPELINE
  #   pull_request to dev  -> test
  #   pull_request to main -> qa
  #   push to dev          -> dev
  #   push to main         -> prod
  # ============================================================

  EnsureTerraformBackendExists:
    if: >
      github.event_name == matrix.event_name &&
      ((matrix.event_name == 'push' && github.ref_name == matrix.target_branch) ||
      (matrix.event_name == 'pull_request' && github.base_ref == matrix.target_branch))
    name: ${{ matrix.ensure_backend_name }}
    strategy:
      matrix:
        include:
          - event_name: pull_request
            target_branch: dev
            environment: test
            concurrency_group: deployment-test
            ensure_backend_name: EnsureTerraformBackendExistsTest
          - event_name: pull_request
            target_branch: main
            environment: qa
            concurrency_group: deployment-qa
            ensure_backend_name: EnsureTerraformBackendExistsQa
          - event_name: push
            target_branch: dev
            environment: dev
            concurrency_group: deployment-dev
            ensure_backend_name: EnsureTerraformBackendExistsDev
          - event_name: push
            target_branch: main
            environment: prod
            concurrency_group: deployment-prod
            ensure_backend_name: EnsureTerraformBackendExistsProd
    environment: ${{ matrix.environment }}
    concurrency:
      group: ${{ matrix.concurrency_group }}
      cancel-in-progress: false
    permissions:
      contents: 'read'
      id-token: 'write'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
      - uses: 'google-github-actions/auth@v3'
        with:
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          create_credentials_file: true
          export_environment_variables: true
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
      - name: 'Use gcloud CLI'
        run: 'gcloud info'
      - name: check/create bucket
        run: |
          gcloud storage buckets describe "gs://${{ vars.TERRAFORM_BACKEND_BUCKET }}" \
            --project="${{ vars.PROJECT }}" \
          || gcloud storage buckets create "gs://${{ vars.TERRAFORM_BACKEND_BUCKET }}" \
            --project="${{ vars.PROJECT }}" \
            --location="${{ vars.LOCATION }}"

  Terraform:
    if: >
      github.event_name == matrix.event_name &&
      ((matrix.event_name == 'push' && github.ref_name == matrix.target_branch) ||
      (matrix.event_name == 'pull_request' && github.base_ref == matrix.target_branch))
    name: ${{ matrix.terraform_name }}
    strategy:
      matrix:
        include:
          - event_name: pull_request
            target_branch: dev
            environment: test
            concurrency_group: deployment-test
            terraform_name: Terraform (Test)
            image_tag: test
          - event_name: pull_request
            target_branch: main
            environment: qa
            concurrency_group: deployment-qa
            terraform_name: Terraform (QA)
            image_tag: qa
          - event_name: push
            target_branch: dev
            environment: dev
            concurrency_group: deployment-dev
            terraform_name: Terraform (dev)
            image_tag: dev
          - event_name: push
            target_branch: main
            environment: prod
            concurrency_group: deployment-prod
            terraform_name: Terraform (prod)
            image_tag: latest
    environment: ${{ matrix.environment }}
    concurrency:
      group: ${{ matrix.concurrency_group }}
      cancel-in-progress: false
    needs: [EnsureTerraformBackendExists]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infrastructure
    outputs:
      backend_url: ${{ steps.terraform-output.outputs.backend_url }}
      frontend_url: ${{ steps.terraform-output.outputs.frontend_url }}
      backend_name: ${{ steps.terraform-output.outputs.backend_name }}
      frontend_name: ${{ steps.terraform-output.outputs.frontend_name }}
    permissions:
      contents: 'read'
      id-token: 'write'
      pull-requests: write
    env:
      IMAGE_TAG: ${{ matrix.image_tag }}
    steps:
      - uses: actions/checkout@v6
      - uses: 'google-github-actions/auth@v3'
        with:
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          create_credentials_file: true
          export_environment_variables: true
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
      - name: 'Use gcloud CLI'
        run: 'gcloud info'
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
      - name: Terraform Format
        id: fmt
        run: terraform fmt -check
      - name: Terraform Init
        id: init
        run: terraform init -backend-config="bucket=${{ vars.TERRAFORM_BACKEND_BUCKET }}"
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
      - name: Terraform Apply
        run: |
          FE_IMAGE="${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.FE_IMAGE_NAME }}:$IMAGE_TAG"
          BE_IMAGE="${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.BE_IMAGE_NAME }}:$IMAGE_TAG"
          FE_EXISTS=$(gcloud artifacts docker images describe "$FE_IMAGE" --project="${{ vars.PROJECT }}" 2>/dev/null && echo true || echo false)
          BE_EXISTS=$(gcloud artifacts docker images describe "$BE_IMAGE" --project="${{ vars.PROJECT }}" 2>/dev/null && echo true || echo false)
          if [ "$FE_EXISTS" = "true" ] && [ "$BE_EXISTS" = "true" ]; then
            terraform apply -auto-approve -input=false \
              -var="project=${{ vars.PROJECT }}" \
              -var="frontend_image=$FE_IMAGE" \
              -var="backend_image=$BE_IMAGE"
          else
            terraform apply -auto-approve -input=false \
              -var="project=${{ vars.PROJECT }}"
          fi
      - name: Capture Terraform output
        id: terraform-output
        run: |
          echo "backend_url=$(terraform output -raw backend_url)" >> $GITHUB_OUTPUT
          echo "frontend_url=$(terraform output -raw frontend_url)" >> $GITHUB_OUTPUT
          echo "backend_name=$(terraform output -raw backend_name)" >> $GITHUB_OUTPUT
          echo "frontend_name=$(terraform output -raw frontend_name)" >> $GITHUB_OUTPUT
      - name: Log Terraform URLs
        run: |
          echo "Backend URL: ${{ steps.terraform-output.outputs.backend_url }}"
          echo "Frontend URL: ${{ steps.terraform-output.outputs.frontend_url }}"

  BuildPushDeployFE:
    if: >
      github.event_name == matrix.event_name &&
      ((matrix.event_name == 'push' && github.ref_name == matrix.target_branch) ||
      (matrix.event_name == 'pull_request' && github.base_ref == matrix.target_branch))
    name: ${{ matrix.deploy_name }}
    strategy:
      matrix:
        include:
          - event_name: pull_request
            target_branch: dev
            environment: test
            concurrency_group: deployment-test
            deploy_name: Build Push and Deploy Frontend (Test)
            image_tag: test
            cache_tag: buildcache-test
          - event_name: pull_request
            target_branch: main
            environment: qa
            concurrency_group: deployment-qa
            deploy_name: Build Push and Deploy Frontend (QA)
            image_tag: qa
            cache_tag: buildcache-qa
          - event_name: push
            target_branch: dev
            environment: dev
            concurrency_group: deployment-dev
            deploy_name: Build Push and Deploy Frontend (dev)
            image_tag: dev
            cache_tag: buildcache-dev
          - event_name: push
            target_branch: main
            environment: prod
            concurrency_group: deployment-prod
            deploy_name: Build Push and Deploy Frontend (prod)
            image_tag: latest
            cache_tag: buildcache
    environment: ${{ matrix.environment }}
    concurrency:
      group: ${{ matrix.concurrency_group }}
      cancel-in-progress: false
    needs: [Terraform, TestFrontend]
    runs-on: ubuntu-latest
    env:
      CACHE_TAG: ${{ matrix.cache_tag }}
      IMAGE_TAG: ${{ matrix.image_tag }}
      SERVICE_NAME: ${{ needs.Terraform.outputs.frontend_name }}
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v6
      - id: auth
        uses: 'google-github-actions/auth@v3'
        with:
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          create_credentials_file: true
          export_environment_variables: true
          access_token_lifetime: 300s
          token_format: access_token
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
      - name: 'Use gcloud CLI'
        run: 'gcloud info'
      - name: 'Login to GCR'
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: 'Build and push fe Docker image'
        uses: docker/build-push-action@v7
        with:
          context: frontend/AnkiAICardCreationFrontend
          platforms: linux/amd64
          file: frontend/AnkiAICardCreationFrontend/Dockerfile
          push: true
          tags: ${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.FE_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=registry,ref=${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.FE_IMAGE_NAME }}:${{ env.CACHE_TAG }}
          cache-to: type=registry,ref=${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.FE_IMAGE_NAME }}:${{ env.CACHE_TAG }},mode=max
      - name: 'Deploy fe to Cloud Run'
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --image "${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.FE_IMAGE_NAME }}:${{ env.IMAGE_TAG }}" \
            --region "${{ vars.LOCATION }}"

  BuildPushDeployBE:
    if: >
      github.event_name == matrix.event_name &&
      ((matrix.event_name == 'push' && github.ref_name == matrix.target_branch) ||
      (matrix.event_name == 'pull_request' && github.base_ref == matrix.target_branch))
    name: ${{ matrix.deploy_name }}
    strategy:
      matrix:
        include:
          - event_name: pull_request
            target_branch: dev
            environment: test
            concurrency_group: deployment-test
            deploy_name: Build Push and Deploy Backend (Test)
            image_tag: test
            cache_tag: buildcache-test
          - event_name: pull_request
            target_branch: main
            environment: qa
            concurrency_group: deployment-qa
            deploy_name: Build Push and Deploy Backend (QA)
            image_tag: qa
            cache_tag: buildcache-qa
          - event_name: push
            target_branch: dev
            environment: dev
            concurrency_group: deployment-dev
            deploy_name: Build Push and Deploy Backend (dev)
            image_tag: dev
            cache_tag: buildcache-dev
          - event_name: push
            target_branch: main
            environment: prod
            concurrency_group: deployment-prod
            deploy_name: Build Push and Deploy Backend (prod)
            image_tag: latest
            cache_tag: buildcache
    environment: ${{ matrix.environment }}
    concurrency:
      group: ${{ matrix.concurrency_group }}
      cancel-in-progress: false
    needs: [Terraform, TestApi]
    runs-on: ubuntu-latest
    env:
      CACHE_TAG: ${{ matrix.cache_tag }}
      IMAGE_TAG: ${{ matrix.image_tag }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SERVICE_NAME: ${{ needs.Terraform.outputs.backend_name }}
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v6
      - id: auth
        uses: 'google-github-actions/auth@v3'
        with:
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          create_credentials_file: true
          export_environment_variables: true
          access_token_lifetime: 300s
          token_format: access_token
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
      - name: 'Use gcloud CLI'
        run: 'gcloud info'
      - name: 'Login to GCR'
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: 'Build and push be Docker image'
        uses: docker/build-push-action@v7
        with:
          context: backend/AnkiAICardCreationToolboxBackend/
          platforms: linux/amd64
          file: backend/AnkiAICardCreationToolboxBackend/Dockerfile
          push: true
          tags: ${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.BE_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=registry,ref=${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.BE_IMAGE_NAME }}:${{ env.CACHE_TAG }}
          cache-to: type=registry,ref=${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.BE_IMAGE_NAME }}:${{ env.CACHE_TAG }},mode=max
      - name: 'Add Secret Version in Secret Manager'
        run: |
          printf "%s" "$OPENAI_API_KEY" | gcloud secrets versions add openai --data-file=- --project="${{ vars.PROJECT }}"
      - name: 'Deploy be to Cloud Run'
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --image "${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.BE_IMAGE_NAME }}:${{ env.IMAGE_TAG }}" \
            --update-secrets=OPENAI_API_KEY=openai:latest \
            --region "${{ vars.LOCATION }}"

  TestDeployment:
    if: >
      github.event_name == matrix.event_name &&
      ((matrix.event_name == 'push' && github.ref_name == matrix.target_branch) ||
      (matrix.event_name == 'pull_request' && github.base_ref == matrix.target_branch))
    name: ${{ matrix.e2e_name }}
    strategy:
      matrix:
        include:
          - event_name: pull_request
            target_branch: dev
            environment: test
            concurrency_group: deployment-test
            e2e_name: Test Deployment (Test)
          - event_name: pull_request
            target_branch: main
            environment: qa
            concurrency_group: deployment-qa
            e2e_name: Test Deployment (QA)
          - event_name: push
            target_branch: dev
            environment: dev
            concurrency_group: deployment-dev
            e2e_name: Test Deployment (dev)
          - event_name: push
            target_branch: main
            environment: prod
            concurrency_group: deployment-prod
            e2e_name: Test Deployment (prod)
    environment: ${{ matrix.environment }}
    concurrency:
      group: ${{ matrix.concurrency_group }}
      cancel-in-progress: false
    needs: [Terraform, BuildPushDeployFE, BuildPushDeployBE]
    runs-on: ubuntu-latest
    env:
      BACKEND_URL: ${{ needs.Terraform.outputs.backend_url }}
      FRONTEND_URL: ${{ needs.Terraform.outputs.frontend_url }}
    permissions:
      contents: 'read'
    steps:
      - uses: actions/checkout@v6
      - name: 'Wait for function to start'
        run: sleep 120
      - name: 'Test Frontend Deployment'
        run: |
          curl --fail --silent --show-error --location --max-time 30 "$FRONTEND_URL"
      - name: 'Test Backend Deployment'
        run: |
          curl --fail --show-error --location \
            -X POST "$BACKEND_URL/create_cards" \
            -H "Content-Type: application/json" \
            -d '{"text":"Anki Karten zur Funktionsweise von HTTP"}'
