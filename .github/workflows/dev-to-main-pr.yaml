name: "Open Dev to Main PR"

on:
  push:
    branches:
      - dev

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pull-request:
    runs-on: ubuntu-latest
    steps:
      - name: Create or reuse pull request
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const head = 'dev'
            const base = 'main'

            const { data: pullRequests } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head,
              base,
            })

            if (pullRequests.length > 0) {
              core.info(`Open pull request already exists: #${pullRequests[0].number}`)
              return
            }

            const commitMessage = context.payload.head_commit?.message ?? 'Changes pushed to dev'
            const title = 'Promote dev to main'
            const body = [
              'Automated pull request created after a push to `dev`.',
              '',
              `Latest commit: ${commitMessage}`,
            ].join('\n')

            const { data: pullRequest } = await github.rest.pulls.create({
              owner,
              repo,
              head,
              base,
              title,
              body,
            })

            core.info(`Created pull request #${pullRequest.number}`)
