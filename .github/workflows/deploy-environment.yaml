name: "Deploy Environment"

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    secrets:
      OPENAI_API_KEY:
        required: false

env:
  FE_IMAGE_NAME: ankiaicardcreationtoolboxfrontend
  BE_IMAGE_NAME: ankiaicardcreationtoolboxbackend

jobs:
  TestApi:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend/AnkiAICardCreationToolboxBackend
    steps:
      - uses: actions/checkout@v6

      - name: Use Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv
        run: pip install uv

      - name: Check lock
        run: uv lock --check

      - name: Install Dependencies
        run: uv sync --frozen --all-extras

      - name: Ruff Lint
        run: uv run ruff check .

      - name: Ruff Format Check
        run: uv run ruff format --check .

      - name: Type Check
        run: uv run ty check

      - name: Run Tests
        env:
          # PRs run with mocked LLM calls (empty key); pushes use the real API key.
          OPENAI_API_KEY: ${{ github.event_name == 'push' && secrets.OPENAI_API_KEY || '' }}
        run: uv run pytest

  TestFrontend:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend/AnkiAICardCreationFrontend
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25.x'

      - name: Security Audit (lockfile)
        run: npm audit --package-lock-only --audit-level=critical

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:unit

  EnsureTerraformBackendExists:
    name: Ensure Terraform Backend Exists (${{ inputs.environment }})
    environment: ${{ inputs.environment }}
    concurrency:
      group: deployment-${{ inputs.environment }}
      cancel-in-progress: false
    permissions:
      contents: 'read'
      id-token: 'write'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
      - uses: 'google-github-actions/auth@v3'
        with:
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          create_credentials_file: true
          export_environment_variables: true
      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v3'
      - name: Use gcloud CLI
        run: gcloud info
      - name: Check or create bucket
        run: |
          gcloud storage buckets describe "gs://${{ vars.TERRAFORM_BACKEND_BUCKET }}" \
            --project="${{ vars.PROJECT }}" \
          || gcloud storage buckets create "gs://${{ vars.TERRAFORM_BACKEND_BUCKET }}" \
            --project="${{ vars.PROJECT }}" \
            --location="${{ vars.LOCATION }}"

  Terraform:
    name: Terraform (${{ inputs.environment }})
    needs: [EnsureTerraformBackendExists]
    environment: ${{ inputs.environment }}
    concurrency:
      group: deployment-${{ inputs.environment }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infrastructure
    env:
      IMAGE_TAG: ${{ inputs.environment == 'prod' && 'latest' || inputs.environment }}
      FALLBACK_IMAGE: us-docker.pkg.dev/cloudrun/container/hello
    outputs:
      backend_url: ${{ steps.terraform-output.outputs.backend_url }}
      frontend_url: ${{ steps.terraform-output.outputs.frontend_url }}
      backend_name: ${{ steps.terraform-output.outputs.backend_name }}
      frontend_name: ${{ steps.terraform-output.outputs.frontend_name }}
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v6
      - uses: 'google-github-actions/auth@v3'
        with:
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          create_credentials_file: true
          export_environment_variables: true
      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v3'
      - name: Use gcloud CLI
        run: gcloud info
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
      - name: Terraform Format
        run: terraform fmt -check
      - name: Terraform Init
        run: terraform init -backend-config="bucket=${{ vars.TERRAFORM_BACKEND_BUCKET }}"
      - name: Terraform Validate
        run: terraform validate -no-color
      - name: Resolve Terraform images
        id: resolve_images
        run: |
          backend_image="${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.BE_IMAGE_NAME }}:$IMAGE_TAG"
          frontend_image="${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.FE_IMAGE_NAME }}:$IMAGE_TAG"

          if gcloud artifacts docker images describe "$backend_image" >/dev/null 2>&1; then
            resolved_backend_image="$backend_image"
            echo "Using backend image for Terraform apply: $backend_image"
          else
            resolved_backend_image="$FALLBACK_IMAGE"
            echo "Backend image not found for Terraform apply, using fallback: $FALLBACK_IMAGE"
          fi

          if gcloud artifacts docker images describe "$frontend_image" >/dev/null 2>&1; then
            resolved_frontend_image="$frontend_image"
            echo "Using frontend image for Terraform apply: $frontend_image"
          else
            resolved_frontend_image="$FALLBACK_IMAGE"
            echo "Frontend image not found for Terraform apply, using fallback: $FALLBACK_IMAGE"
          fi

          echo "backend_image=$resolved_backend_image" >> "$GITHUB_OUTPUT"
          echo "frontend_image=$resolved_frontend_image" >> "$GITHUB_OUTPUT"
      - name: Terraform Apply
        run: |
          terraform apply -auto-approve -input=false \
            -var="project=${{ vars.PROJECT }}" \
            -var="backend_image=${{ steps.resolve_images.outputs.backend_image }}" \
            -var="frontend_image=${{ steps.resolve_images.outputs.frontend_image }}"
      - name: Capture Terraform output
        id: terraform-output
        run: |
          echo "backend_url=$(terraform output -raw backend_url)" >> "$GITHUB_OUTPUT"
          echo "frontend_url=$(terraform output -raw frontend_url)" >> "$GITHUB_OUTPUT"
          echo "backend_name=$(terraform output -raw backend_name)" >> "$GITHUB_OUTPUT"
          echo "frontend_name=$(terraform output -raw frontend_name)" >> "$GITHUB_OUTPUT"

  BuildPushDeployFE:
    name: Build Push and Deploy Frontend (${{ inputs.environment }})
    needs: [Terraform, TestFrontend]
    environment: ${{ inputs.environment }}
    concurrency:
      group: deployment-${{ inputs.environment }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    env:
      CACHE_TAG: ${{ inputs.environment == 'prod' && 'buildcache' || format('buildcache-{0}', inputs.environment) }}
      IMAGE_TAG: ${{ inputs.environment == 'prod' && 'latest' || inputs.environment }}
      SERVICE_NAME: ${{ needs.Terraform.outputs.frontend_name }}
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v6
      - id: auth
        uses: 'google-github-actions/auth@v3'
        with:
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          create_credentials_file: true
          export_environment_variables: true
          access_token_lifetime: 300s
          token_format: access_token
      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v3'
      - name: Use gcloud CLI
        run: gcloud info
      - name: Login to GCR
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push FE Docker image
        uses: docker/build-push-action@v7
        with:
          context: frontend/AnkiAICardCreationFrontend
          platforms: linux/amd64
          file: frontend/AnkiAICardCreationFrontend/Dockerfile
          push: true
          tags: ${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.FE_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=registry,ref=${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.FE_IMAGE_NAME }}:${{ env.CACHE_TAG }}
          cache-to: type=registry,ref=${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.FE_IMAGE_NAME }}:${{ env.CACHE_TAG }},mode=max
      - name: Deploy FE to Cloud Run
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --image "${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.FE_IMAGE_NAME }}:${{ env.IMAGE_TAG }}" \
            --region "${{ vars.LOCATION }}"

  BuildPushDeployBE:
    name: Build Push and Deploy Backend (${{ inputs.environment }})
    needs: [Terraform, TestApi]
    environment: ${{ inputs.environment }}
    concurrency:
      group: deployment-${{ inputs.environment }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    env:
      CACHE_TAG: ${{ inputs.environment == 'prod' && 'buildcache' || format('buildcache-{0}', inputs.environment) }}
      IMAGE_TAG: ${{ inputs.environment == 'prod' && 'latest' || inputs.environment }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SERVICE_NAME: ${{ needs.Terraform.outputs.backend_name }}
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v6
      - id: auth
        uses: 'google-github-actions/auth@v3'
        with:
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          create_credentials_file: true
          export_environment_variables: true
          access_token_lifetime: 300s
          token_format: access_token
      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v3'
      - name: Use gcloud CLI
        run: gcloud info
      - name: Login to GCR
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push BE Docker image
        uses: docker/build-push-action@v7
        with:
          context: backend/AnkiAICardCreationToolboxBackend/
          platforms: linux/amd64
          file: backend/AnkiAICardCreationToolboxBackend/Dockerfile
          push: true
          tags: ${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.BE_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=registry,ref=${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.BE_IMAGE_NAME }}:${{ env.CACHE_TAG }}
          cache-to: type=registry,ref=${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.BE_IMAGE_NAME }}:${{ env.CACHE_TAG }},mode=max
      - name: Add Secret Version in Secret Manager
        run: |
          printf "%s" "$OPENAI_API_KEY" | gcloud secrets versions add openai --data-file=- --project="${{ vars.PROJECT }}"
      - name: Deploy BE to Cloud Run
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --image "${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/${{ env.BE_IMAGE_NAME }}:${{ env.IMAGE_TAG }}" \
            --update-secrets=OPENAI_API_KEY=openai:latest \
            --region "${{ vars.LOCATION }}"

  TestDeployment:
    name: Test Deployment (${{ inputs.environment }})
    needs: [Terraform, BuildPushDeployFE, BuildPushDeployBE]
    environment: ${{ inputs.environment }}
    concurrency:
      group: deployment-${{ inputs.environment }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    env:
      BACKEND_URL: ${{ needs.Terraform.outputs.backend_url }}
      FRONTEND_URL: ${{ needs.Terraform.outputs.frontend_url }}
    permissions:
      contents: 'read'
    steps:
      - uses: actions/checkout@v6
      - name: Wait for function to start
        run: sleep 120
      - name: Test Frontend Deployment
        run: curl --fail --silent --show-error --location --max-time 30 "$FRONTEND_URL"
      - name: Test Backend Deployment
        run: |
          curl --fail --show-error --location \
            -X POST "$BACKEND_URL/create_cards" \
            -H "Content-Type: application/json" \
            -d '{"text":"Anki Karten zur Funktionsweise von HTTP"}'
